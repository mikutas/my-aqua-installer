name: my-aqua-installer
description: 'checkout>aqua-installer'
inputs:
  aqua_opts:
    description: https://aquaproj.github.io/docs/products/aqua-installer/
    required: false
    default: "-l"
runs:
  using: "composite"
  steps:
    - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

    - uses: aquaproj/aqua-installer@96a9bc20066c5bf5e275b41019cfc165b25f4e2e # v4.0.5
      with:
        aqua_version: v2.62.0
        aqua_opts: ${{ inputs.aqua_opts }}
